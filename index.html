<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Colored — Coming Soon</title>
<meta name="description" content="Rose Colored is the app Black people have been waiting for — community, wellness, culture, and creativity, all in one place. Join the waitlist.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#060403;--bg2:#0e0a06;--bg3:#17110b;--bg4:#201810;--bg5:#2a1f15;
  --text:#F0E6D6;--text-muted:#7a6654;--text-soft:#c0a080;
  --accent:#C8904A;--rose:#E8708A;
  --rose-glow:rgba(232,112,138,0.35);
  --border:rgba(200,144,74,0.18);--border2:rgba(200,144,74,0.08);
  --radius:12px;
  --transition:all 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(200,144,74,0.07) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 90% 90%,rgba(232,112,138,0.05) 0%,transparent 50%);pointer-events:none;z-index:0;}


/* ── ROSE MODE ── */
.rose-mode{
  --bg:#180610;--bg2:#22091a;--bg3:#2d0d22;--bg4:#3a112c;--bg5:#481635;
  --text:#f5dde6;--text-muted:#9a6878;--text-soft:#d4a0b2;
  --accent:#C8904A;--rose:#E8708A;
  --rose-glow:rgba(232,112,138,0.5);
  --border:rgba(232,112,138,0.28);--border2:rgba(232,112,138,0.12);
}
.rose-mode nav{background:rgba(24,6,16,0.95);}
.rose-mode .nav-tabs-wrap::after{background:linear-gradient(to left,rgba(24,6,16,0.95),transparent);}
/* Glasses */
.glasses-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 14px;border-radius:50px;border:1px solid var(--border);transition:all 0.3s;position:relative;user-select:none;}
.glasses-wrap:hover{border-color:var(--rose);}
.glasses-frame{display:flex;align-items:center;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);}
.glasses-frame.tilted{transform:rotate(-12deg) translateY(-1px);}
.gl-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--rose);white-space:nowrap;}
@keyframes roseGlow{0%,100%{box-shadow:0 0 0 0 transparent;border-color:var(--border);}50%{box-shadow:0 0 12px var(--rose-glow);border-color:var(--rose);}}
.glasses-wrap{animation:roseGlow 2.6s ease-in-out infinite;}
.glasses-wrap.lens-on{animation:roseGlowOn 2.6s ease-in-out infinite;}
@keyframes roseGlowOn{0%,100%{box-shadow:0 0 8px var(--rose-glow);border-color:rgba(232,112,138,0.6);}50%{box-shadow:0 0 20px var(--rose-glow);border-color:var(--rose);}}
/* Lens toast */
.lens-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:10px 24px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text);white-space:nowrap;opacity:0;transition:opacity 0.4s,transform 0.4s;z-index:2000;pointer-events:none;}
.lens-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Hero images */
.collage-cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;filter:grayscale(15%) contrast(1.05);transition:opacity 0.8s ease;opacity:1;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(6,4,3,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;padding:0 48px;justify-content:space-between;}
@media(max-width:600px){nav{padding:0 20px;}}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;font-style:italic;color:var(--text);letter-spacing:0.01em;cursor:pointer;}
.nav-logo span{color:var(--accent);}
